version: '3.8'

services:
  node1:
    build: ./node
    container_name: node1
    environment:
      - NODE_ID=node1
      - NODE_ROLE=edge
      - PORT=5000
    ports:
      - "5001:5000"
    restart: unless-stopped
    networks: [iotnet]

  node2:
    build: ./node
    container_name: node2
    environment:
      - NODE_ID=node2
      - NODE_ROLE=edge
      - PORT=5000
    ports:
      - "5002:5000"
    restart: unless-stopped
    networks: [iotnet]

  node3:
    build: ./node
    container_name: node3
    environment:
      - NODE_ID=node3
      - NODE_ROLE=edge
      - PORT=5000
    ports:
      - "5003:5000"
    restart: unless-stopped
    networks: [iotnet]

  node4:
    build: ./node
    container_name: node4
    environment:
      - NODE_ID=node4
      - NODE_ROLE=edge
      - PORT=5000
    ports:
      - "5004:5000"
    restart: unless-stopped
    networks: [iotnet]

  fog1:
    build: ./node
    container_name: fog1
    environment:
      - NODE_ID=fog1
      - NODE_ROLE=fog
      - PORT=5000
    ports:
      - "5005:5000"
    restart: unless-stopped
    networks: [iotnet]

  monitor:
    build: ./monitor
    container_name: monitor
    ports:
      - "7000:7000"
    depends_on:
      - node1
      - node2
      - node3
      - node4
      - fog1
    restart: unless-stopped
    networks: [iotnet]

networks:
  iotnet:
    driver: bridge
