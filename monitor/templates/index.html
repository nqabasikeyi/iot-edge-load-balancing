<!DOCTYPE html>
<html>
<head>
    <title>Smart Campus Edge Dashboard</title>
    <style>
        body { background:#111; color:#eee; font-family:Arial; margin:20px; }
        .nodes-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .node-card { background:#1e1e1e; padding:15px; border-radius:10px; }
        .badge { padding:5px 10px; border-radius:5px; font-weight:bold; display:inline-block; margin:6px 0; }
        .max-reached { background:#8b0000; color:#fff; }
        .balancing { background:#7a4b00; color:#fff; }
        .normal { background:green; color:white; }
        .offline { background:gray; color:white; }
        .receiving { background:orange; color:black; }
        .fog { background:#3d7bfd; color:white; }
        .mini-badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; margin:4px 6px 0 0; background:#2b2b2b; color:#ddd; border:1px solid #3a3a3a; }
        .mini-badge.alert { background:#4a1f1f; color:#ffb3b3; border:1px solid #7a2f2f; }
        .mini-badge.warn { background:#4a3b12; color:#ffd98a; border:1px solid #7a6320; }
        button { margin:3px; padding:5px 10px; cursor:pointer; }
        input[type="range"] { width:100%; }
        .summary { background:#222; padding:15px; border-radius:10px; margin-bottom:20px; }
        .log-line { font-size:13px; color:#ccc; margin:3px 0; }
        .muted { color:#aaa; font-size:13px; }
        .divider { margin:10px 0; border-top:1px solid #333; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 20px; }
        .k { color:#bbb; }
        .reason-wrap { margin-top:6px; }
        .section-title { color:#bbb; font-size:13px; margin-bottom:6px; }
        .slider-wrap { margin:10px 0; }
        .sensor-label { font-size:13px; color:#bbb; margin-bottom:2px; }
        @media (max-width: 900px) { .nodes-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<h1>Smart Campus Distributed Monitoring System</h1>
<div id="system-summary"></div>
<div id="event-log" class="summary"></div>
<div id="nodes" class="nodes-grid"></div>

<script>
let updateTimeouts = {};
let systemLogs = [];
let lastEventsSignature = "";

function fmt(n, d=0){
    if (n === undefined || n === null || Number.isNaN(Number(n))) return Number(0).toFixed(d);
    return Number(n).toFixed(d);
}

function renderEventLog(){
    document.getElementById("event-log").innerHTML =
        "<h3>System Events</h3>" +
        (systemLogs.length ? systemLogs.map(l => `<div class="log-line">${l}</div>`).join("") : `<div class="muted">No recent balancing events.</div>`);
}

function setEventsFromMonitor(events){
    const normalized = (events || []).map(e => String(e));
    const signature = normalized.join("||");
    if (signature === lastEventsSignature) return;
    lastEventsSignature = signature;
    systemLogs = normalized.slice().reverse().slice(0, 14);
    renderEventLog();
}

function reasonBadge(reason){
    const r = String(reason || "").toLowerCase();
    const cls = (r.includes("max") || r.includes("cpu") || r.includes("queue")) ? "mini-badge alert" : "mini-badge warn";
    return `<span class="${cls}">${reason}</span>`;
}

function statusClass(status){
    const s = String(status || "NORMAL");
    if (s === "OFFLINE") return "offline";
    if (s === "RECEIVING") return "receiving";
    if (s === "FOG-RECEIVING") return "fog";
    if (s === "BALANCING-SEND") return "balancing";
    if (s === "MAX-REACHED") return "max-reached";
    return "normal";
}

async function fetchNodes() {
    const res = await fetch("/nodes");
    const result = await res.json();
    const data = result.nodes || [];
    const system = result.system || {average_cpu:0,total_queue:0,active_nodes:0,overloaded_nodes:0,balance_score:0,total_throughput:0,edge_nodes:0,fog_nodes:0};
    const events = result.events || [];
    setEventsFromMonitor(events);

    document.getElementById("system-summary").innerHTML = `
        <div class="summary">
            <h2>System Performance</h2>
            Average CPU: ${fmt(system.average_cpu, 2)}%<br>
            Total Queue: ${system.total_queue}<br>
            Active Nodes: ${system.active_nodes}<br>
            Edge Nodes: ${system.edge_nodes ?? 0}<br>
            Fog Nodes: ${system.fog_nodes ?? 0}<br>
            Max-Reached Nodes: ${system.overloaded_nodes}<br>
            System Balance Score: ${fmt(system.balance_score, 2)}%<br>
            Total Throughput: ${fmt(system.total_throughput, 0)} tasks/s
        </div>`;

    let html = "";
    data.forEach(node => {
        const building = node.building || {name:"Unknown", size:0, capacity:0};
        const sensors = node.sensor_values || {};
        const limits = node.sensor_limits || {};
        const role = node.role || "edge";
        const status = node.status || "NORMAL";
        const isOffline = status === "OFFLINE";
        const isFog = role === "fog";
        const overloadReasons = Array.isArray(node.overload_reasons) ? node.overload_reasons : [];
        const secondaryReasons = Array.isArray(node.secondary_reasons) ? node.secondary_reasons : [];
        const sensorMaxReasons = Array.isArray(node.sensor_max_reasons) ? node.sensor_max_reasons : [];
        const receivedFrom = Array.isArray(node.received_from) ? node.received_from : [];
        const sentTo = Array.isArray(node.sent_to) ? node.sent_to : [];

        const reasonsHtml = overloadReasons.length ? overloadReasons.map(reasonBadge).join("") : `<span class="muted">None</span>`;
        const secondaryHtml = secondaryReasons.length ? secondaryReasons.map(reasonBadge).join("") : `<span class="muted">None</span>`;
        const sensorMaxHtml = sensorMaxReasons.length ? sensorMaxReasons.map(reasonBadge).join("") : `<span class="muted">None</span>`;
        const receivingHtml = receivedFrom.length ? receivedFrom.map(x => `<span class="mini-badge warn">from ${x.source}: +${x.amount}</span>`).join("") : `<span class="muted">None</span>`;
        const sendingHtml = sentTo.length ? sentTo.map(x => `<span class="mini-badge warn">to ${x.target}: -${x.amount}</span>`).join("") : `<span class="muted">None</span>`;

        html += `
        <div class="node-card">
            <h2>${node.node || node.address}</h2>
            <div class="muted">Address: ${node.address || "unknown"}</div>
            <span class="badge ${statusClass(status)}">${status}</span>

            <div class="divider"></div>
            <div class="grid">
                <div><span class="k"><b>Building</b></span><br>${building.name}</div>
                <div><span class="k"><b>Size</b></span><br>${building.size} m²</div>
                <div><span class="k"><b>Capacity</b></span><br>${building.capacity}</div>
                <div><span class="k"><b>Role</b></span><br>${role.toUpperCase()}</div>
                <div><span class="k"><b>People</b></span><br>${sensors.people ?? 0}</div>
                <div><span class="k"><b>Load Score</b></span><br>${fmt(node.load_score, 2)}</div>
            </div>

            <div class="divider"></div>
            <div class="grid">
                <div><span class="k">CPU</span><br>${fmt(node.cpu_percent, 2)}%</div>
                <div><span class="k">Memory</span><br>${fmt(node.memory_percent, 2)}%</div>
                <div><span class="k">Queue</span><br>${node.queue_length ?? 0}</div>
                <div><span class="k">Network Latency</span><br>${fmt(node.latency_ms, 2)} ms</div>
                <div><span class="k">Processing Latency</span><br>${fmt(node.processing_latency_ms, 2)} ms</div>
                <div><span class="k">Throughput</span><br>${node.effective_processing ?? 0} tasks/s</div>
                <div><span class="k">Offloaded In</span><br>${node.offloaded_in ?? 0}</div>
                <div><span class="k">Local Processed</span><br>${node.local_processed ?? 0}</div>
            </div>

            <div class="divider"></div>
            <div class="grid">
                <div><span class="k">Temperature</span><br>${fmt(sensors.temperature, 1)} °C</div>
                <div><span class="k">Humidity</span><br>${fmt(sensors.humidity, 1)}%</div>
                <div><span class="k">Motion</span><br>${fmt(sensors.motion, 1)}</div>
                <div><span class="k">CO₂</span><br>${sensors.air_quality ?? 0} ppm</div>
                <div><span class="k">Power</span><br>${fmt(sensors.power, 1)}</div>
                <div><span class="k">Anomaly Multiplier</span><br>${fmt(node.anomaly_multiplier, 2)}x</div>
            </div>

            <div class="reason-wrap">
                <div class="section-title">Balance / Max Reasons</div>${reasonsHtml}
            </div>
            <div class="reason-wrap">
                <div class="section-title">Sensor Max Flags</div>${sensorMaxHtml}
            </div>
            <div class="reason-wrap">
                <div class="section-title">Secondary Trigger Flags</div>${secondaryHtml}
            </div>
            <div class="reason-wrap">
                <div class="section-title">Sending</div>${sendingHtml}
            </div>
            <div class="reason-wrap">
                <div class="section-title">Receiving</div>${receivingHtml}
            </div>

            <div class="divider"></div>
            ${isFog ? `<div class="muted">Fog node acts as nearby fallback processing capacity. Environmental sliders are disabled for it.</div>` : `
            <div class="slider-wrap">
                <div class="sensor-label">People: <span id="people-val-${node.address}">${sensors.people ?? 0}</span> / ${(limits.people && limits.people.max) || building.capacity || 0}</div>
                <input type="range" ${isOffline ? "disabled" : ""} min="0" max="${(limits.people && limits.people.max) || building.capacity || 0}" value="${sensors.people ?? 0}" oninput="handlePeopleChange('${node.address}', this)">
            </div>
            <div class="slider-wrap">
                <div class="sensor-label">Temperature: <span id="temperature-val-${node.address}">${fmt(sensors.temperature, 1)}</span> / ${(limits.temperature && limits.temperature.max) || 40}</div>
                <input type="range" ${isOffline ? "disabled" : ""} min="18" max="${(limits.temperature && limits.temperature.max) || 40}" step="0.5" value="${sensors.temperature ?? 22}" oninput="handleSensorChange('${node.address}', 'temperature', this)">
            </div>
            <div class="slider-wrap">
                <div class="sensor-label">Humidity: <span id="humidity-val-${node.address}">${fmt(sensors.humidity, 1)}</span> / ${(limits.humidity && limits.humidity.max) || 90}</div>
                <input type="range" ${isOffline ? "disabled" : ""} min="25" max="${(limits.humidity && limits.humidity.max) || 90}" step="1" value="${sensors.humidity ?? 45}" oninput="handleSensorChange('${node.address}', 'humidity', this)">
            </div>
            <div class="slider-wrap">
                <div class="sensor-label">Motion: <span id="motion-val-${node.address}">${fmt(sensors.motion, 1)}</span> / ${(limits.motion && limits.motion.max) || 100}</div>
                <input type="range" ${isOffline ? "disabled" : ""} min="0" max="${(limits.motion && limits.motion.max) || 100}" step="1" value="${sensors.motion ?? 0}" oninput="handleSensorChange('${node.address}', 'motion', this)">
            </div>
            <div class="slider-wrap">
                <div class="sensor-label">CO₂: <span id="air_quality-val-${node.address}">${sensors.air_quality ?? 400}</span> / ${(limits.air_quality && limits.air_quality.max) || 2000}</div>
                <input type="range" ${isOffline ? "disabled" : ""} min="350" max="${(limits.air_quality && limits.air_quality.max) || 2000}" step="10" value="${sensors.air_quality ?? 400}" oninput="handleSensorChange('${node.address}', 'air_quality', this)">
            </div>
            <div class="slider-wrap">
                <div class="sensor-label">Power: <span id="power-val-${node.address}">${fmt(sensors.power, 1)}</span> / ${(limits.power && limits.power.max) || 15}</div>
                <input type="range" ${isOffline ? "disabled" : ""} min="0.5" max="${(limits.power && limits.power.max) || 15}" step="0.1" value="${sensors.power ?? 1.5}" oninput="handleSensorChange('${node.address}', 'power', this)">
            </div>`}

            <div class="divider"></div>
            <button ${isOffline ? "disabled" : ""} onclick="shutdownNode('${node.address}')">Shutdown</button>
            <button onclick="activateNode('${node.address}')">Activate</button>
        </div>`;
    });

    document.getElementById("nodes").innerHTML = html;
}

function postDebounced(key, fn){
    if (updateTimeouts[key]) clearTimeout(updateTimeouts[key]);
    updateTimeouts[key] = setTimeout(fn, 220);
}

function handlePeopleChange(address, slider) {
    const value = slider.value;
    const label = document.getElementById("people-val-" + address);
    if (label) label.innerText = value;
    postDebounced(address + "-people", async () => {
        await fetch("/control_people", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({node: address, people: value})
        });
    });
}

function handleSensorChange(address, sensor, slider) {
    const value = slider.value;
    const label = document.getElementById(sensor + "-val-" + address);
    if (label) label.innerText = value;
    postDebounced(address + "-" + sensor, async () => {
        await fetch("/control_sensor", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({node: address, sensor: sensor, value: value})
        });
    });
}

async function shutdownNode(address){
    await fetch("/control_node", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({node: address, action:"shutdown"})});
}

async function activateNode(address){
    await fetch("/control_node", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({node: address, action:"activate"})});
}

renderEventLog();
fetchNodes();
setInterval(fetchNodes, 2000);
</script>
</body>
</html>
